<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Details — Mila Ventures</title>
<meta name="description" content="View job details and apply — Mila Ventures Talent Marketplace">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><path d='M6 28V10l4.5 6.5L18 6l7.5 10.5L30 10v18' stroke='%236d28d9' stroke-width='2' fill='none'/><circle cx='18' cy='6' r='2' fill='%23a78bfa'/></svg>" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,300;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-page: #f3eff8; --bg-card: #ffffff;
  --accent: #a78bfa; --accent-dark: #6d28d9; --accent-deeper: #4c1d95;
  --accent-light: #c4b5fd; --accent-bg: #ece5fb;
  --text-dark: #1a1230; --text-secondary: #4a3d6b; --text-muted: #8878a9;
  --border-light: #e0d8ed; --border-lighter: #ece5f5;
  --success: #059669; --success-bg: rgba(16,185,129,0.06); --success-border: rgba(16,185,129,0.25);
  --error: #dc2626; --error-bg: rgba(220,38,38,0.06); --error-border: rgba(220,38,38,0.2);
  --font-display: 'Cormorant Garamond', serif; --font-body: 'Jost', sans-serif;
}
html { scroll-behavior: smooth; }
body { background: var(--bg-page); color: var(--text-dark); font-family: var(--font-body); min-height: 100vh; }

/* NAV */
nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 22px 64px; background: var(--bg-page); border-bottom: 1px solid var(--border-lighter); }
.logo-lockup { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo-mark { width: 36px; height: 36px; flex-shrink: 0; }
.logo-name { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: 0.04em; color: var(--text-dark); }
.nav-back { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-size: 13px; color: var(--text-muted); text-decoration: none; transition: color 0.3s; }
.nav-back:hover { color: var(--accent-dark); }
.nav-back svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

/* PAGE */
.page-container { max-width: 760px; margin: 0 auto; padding: 48px 32px 120px; animation: fadeUp 0.5s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* LOADING */
.loading { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 16px; font-weight: 300; }

/* JOB HEADER */
.job-header { margin-bottom: 32px; }
.job-title { font-family: var(--font-display); font-weight: 600; font-size: clamp(28px, 4vw, 40px); line-height: 1.15; letter-spacing: -0.02em; color: var(--text-dark); margin-bottom: 8px; }
.job-company { font-size: 18px; font-weight: 500; color: var(--accent-dark); margin-bottom: 4px; }
.job-company a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--accent-light); transition: border-color 0.3s; }
.job-company a:hover { border-color: var(--accent-dark); }
.job-company-desc { font-size: 15px; font-weight: 300; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; }

/* META PILLS */
.job-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
.meta-pill { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 400; background: var(--bg-page); border: 1px solid var(--border-light); color: var(--text-secondary); }
.meta-pill svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

/* TAGS */
.job-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
.job-tag { padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 400; border: 1px solid var(--border-light); color: var(--text-secondary); background: var(--bg-page); }

/* DESCRIPTION */
.section-title { font-family: var(--font-display); font-size: 24px; font-weight: 600; color: var(--text-dark); margin-bottom: 14px; }
.job-description { font-size: 15px; font-weight: 300; line-height: 1.7; color: var(--text-secondary); margin-bottom: 40px; white-space: pre-wrap; }

/* APPLY SECTION */
.apply-section { background: var(--bg-card); border-radius: 14px; padding: 32px; border: 1px solid var(--border-lighter); box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
.apply-title { font-family: var(--font-display); font-size: 26px; font-weight: 600; color: var(--text-dark); margin-bottom: 6px; }
.apply-desc { font-size: 14px; font-weight: 300; color: var(--text-secondary); margin-bottom: 20px; }
.apply-form { display: flex; flex-direction: column; gap: 16px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-field label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
.form-field label .req { color: var(--accent-dark); }
.form-input { display: block; width: 100%; padding: 14px 16px; background: var(--bg-page); border: 1px solid var(--border-light); border-radius: 8px; font-family: var(--font-body); font-size: 14px; color: var(--text-dark); outline: none; transition: border-color 0.3s, box-shadow 0.3s; }
.form-input::placeholder { color: var(--text-muted); }
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(167,139,250,0.1); }
.form-textarea { display: block; width: 100%; padding: 14px 16px; background: var(--bg-page); border: 1px solid var(--border-light); border-radius: 8px; font-family: var(--font-body); font-size: 14px; color: var(--text-dark); outline: none; resize: vertical; min-height: 80px; transition: border-color 0.3s, box-shadow 0.3s; }
.form-textarea::placeholder { color: var(--text-muted); }
.form-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(167,139,250,0.1); }

/* FILE INPUT */
.file-input-wrapper { position: relative; }
.file-input-wrapper input[type="file"] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
.file-input-label { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px; background: var(--bg-page); border: 2px dashed var(--border-light); border-radius: 8px; font-size: 14px; color: var(--text-muted); cursor: pointer; transition: all 0.3s; }
.file-input-label:hover { border-color: var(--accent); color: var(--accent-dark); }
.file-input-label svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
.file-input-label.has-file { border-color: var(--success); color: var(--success); background: var(--success-bg); }

.form-submit { display: block; width: 100%; padding: 16px; background: var(--accent-dark); color: white; border: none; border-radius: 10px; font-family: var(--font-body); font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
.form-submit:hover { background: var(--accent-deeper); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(109,40,217,0.25); }
.form-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

/* STATUS */
.status-msg { display: none; padding: 14px 18px; border-radius: 10px; font-size: 14px; line-height: 1.5; margin-top: 16px; }
.status-msg.active { display: block; }
.status-msg.success { background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success); }
.status-msg.error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error); }

/* RESPONSIVE */
@media (max-width: 768px) {
  nav { padding: 18px 24px; }
  .page-container { padding: 32px 20px 80px; }
  .apply-section { padding: 24px 20px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="talent-marketplace-v4-light-purple.html" class="logo-lockup">
    <svg class="logo-mark" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 28V10l4.5 6.5L18 6l7.5 10.5L30 10v18" stroke="#6d28d9" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="18" cy="6" r="1.6" fill="#a78bfa"/>
      <line x1="6" y1="28" x2="8.5" y2="28" stroke="#6d28d9" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="27.5" y1="28" x2="30" y2="28" stroke="#6d28d9" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <div class="logo-name">Mila Ventures</div>
  </a>
  <a href="javascript:history.back()" class="nav-back">
    <svg viewBox="0 0 24 24"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
    Back
  </a>
</nav>

<div class="page-container">
  <div id="jobContent">
    <p class="loading">Loading job details...</p>
  </div>

  <!-- Apply form (hidden until job loads) -->
  <div class="apply-section" id="applySection" style="display:none;">
    <div class="apply-title">Apply for this role</div>
    <p class="apply-desc">Fill in your details and upload your CV. We'll get back to you soon.</p>
    <div class="apply-form">
      <div class="form-row">
        <div class="form-field">
          <label>Full name <span class="req">*</span></label>
          <input type="text" class="form-input" id="applyName" placeholder="Your full name">
        </div>
        <div class="form-field">
          <label>Email <span class="req">*</span></label>
          <input type="email" class="form-input" id="applyEmail" placeholder="you@example.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>LinkedIn URL</label>
          <input type="url" class="form-input" id="applyLinkedin" placeholder="https://linkedin.com/in/yourprofile">
        </div>
        <div class="form-field">
          <label>Current role</label>
          <input type="text" class="form-input" id="applyRole" placeholder="e.g. Senior ML Engineer">
        </div>
      </div>
      <div class="form-field">
        <label>CV / Resume <span class="req">*</span></label>
        <div class="file-input-wrapper">
          <input type="file" id="applyCv" accept=".pdf,.doc,.docx" onchange="handleFileSelect(this)">
          <div class="file-input-label" id="fileLabel">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span id="fileName">Upload PDF, DOC, or DOCX</span>
          </div>
        </div>
      </div>
      <div class="form-field">
        <label>Cover note <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted);">(optional)</span></label>
        <textarea class="form-textarea" id="applyCoverNote" placeholder="Why are you interested in this role? What makes you a great fit?"></textarea>
      </div>
      <button type="button" class="form-submit" id="applyBtn" onclick="submitApplication()">Submit application</button>
      <div class="status-msg success" id="successMsg"></div>
      <div class="status-msg error" id="errorMsg"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
var PROXY_URL = 'https://frontier-proxy.christinamoro3.workers.dev';
var AIRTABLE_BASE_ID = 'appP3T62XSwUvnCZk';
var AIRTABLE_JOBS_TABLE = 'Job%20Listings';
var AIRTABLE_CV_TABLE = 'CV%20Applications';

// Proxy helper — routes Airtable API calls through Cloudflare Worker
function proxyFetch(airtablePath, options) {
  options = options || {};
  var headers = options.headers || {};
  headers['X-Airtable-Path'] = airtablePath;
  options.headers = headers;
  return fetch(PROXY_URL + '/proxy', options);
}

var currentJob = null;

// ============================================================
// FETCH JOB BY ID
// ============================================================
function getJobId() {
  var params = new URLSearchParams(window.location.search);
  return params.get('id') || '';
}

function fetchJob(recordId) {
  if (!recordId) {
    document.getElementById('jobContent').innerHTML = '<p class="loading">No job ID provided. <a href="talent-marketplace-v4-light-purple.html">Browse all jobs</a></p>';
    return;
  }
  var path = '/v0/' + AIRTABLE_BASE_ID + '/' + AIRTABLE_JOBS_TABLE + '/' + recordId;

  proxyFetch(path)
  .then(function(r) { return r.json(); })
  .then(function(rec) {
    if (rec.error) {
      document.getElementById('jobContent').innerHTML = '<p class="loading">Job not found. <a href="talent-marketplace-v4-light-purple.html">Browse all jobs</a></p>';
      return;
    }
    var f = rec.fields;
    currentJob = {
      id: rec.id,
      title: f['Job Title'] || '',
      company: f['Company'] || '',
      companyDesc: f['Company Description (1-liner)'] || '',
      companyDescLong: f['Company Description'] || '',
      companyUrl: f['Company Website URL'] || '',
      desc: f['Job Description'] || '',
      tags: f['Tags'] || [],
      keywords: f['Keywords'] || '',
      category: f['Category'] || '',
      status: f['Status'] || '',
      datePosted: f['Date Posted'] || '',
      location: f['Location'] || '',
      seniority: f['Seniority'] || '',
      stage: f['Stage'] || '',
      aiDomain: f['AI Domain'] || '',
      industry: f['Industry'] || '',
      department: f['Department'] || ''
    };
    renderJob(currentJob);
    document.title = currentJob.title + ' at ' + currentJob.company + ' — Mila Ventures';
  })
  .catch(function() {
    document.getElementById('jobContent').innerHTML = '<p class="loading">Failed to load job. <a href="talent-marketplace-v4-light-purple.html">Browse all jobs</a></p>';
  });
}

// ============================================================
// RENDER JOB
// ============================================================
function renderJob(job) {
  var companyHtml = job.company;
  if (job.companyUrl) {
    companyHtml = '<a href="' + job.companyUrl + '" target="_blank" rel="noopener">' + job.company + '</a>';
  }

  // Build meta pills
  var pills = '';
  if (job.location) pills += pill('location', job.location);
  if (job.seniority) pills += pill('seniority', job.seniority);
  if (job.department) pills += pill('department', job.department);
  if (job.stage) pills += pill('stage', job.stage);
  if (job.aiDomain) pills += pill('ai', job.aiDomain);
  if (job.industry) pills += pill('industry', job.industry);
  if (job.category) pills += pill('category', job.category);
  if (job.datePosted) pills += pill('date', formatDate(job.datePosted));

  // Build tags
  var tagsHtml = '';
  for (var i = 0; i < job.tags.length; i++) {
    tagsHtml += '<span class="job-tag">' + job.tags[i] + '</span>';
  }

  var html = '<div class="job-header">'
    + '<h1 class="job-title">' + job.title + '</h1>'
    + '<div class="job-company">' + companyHtml + '</div>'
    + (job.companyDesc ? '<p class="job-company-desc">' + job.companyDesc + '</p>' : '')
    + '</div>';

  if (pills) html += '<div class="job-meta">' + pills + '</div>';
  if (tagsHtml) html += '<div class="job-tags">' + tagsHtml + '</div>';

  if (job.companyDescLong) {
    html += '<h2 class="section-title">About the company</h2>'
      + '<div class="job-description">' + job.companyDescLong + '</div>';
  }

  if (job.desc) {
    html += '<h2 class="section-title">About the role</h2>'
      + '<div class="job-description">' + job.desc + '</div>';
  }

  document.getElementById('jobContent').innerHTML = html;
  document.getElementById('applySection').style.display = 'block';
}

function pill(type, text) {
  var icons = {
    location: '<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
    seniority: '<svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>',
    department: '<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>',
    stage: '<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    ai: '<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
    industry: '<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
    category: '<svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>',
    date: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
  };
  return '<span class="meta-pill">' + (icons[type] || '') + text + '</span>';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

// ============================================================
// FILE SELECT
// ============================================================
function handleFileSelect(input) {
  var label = document.getElementById('fileLabel');
  var nameSpan = document.getElementById('fileName');
  if (input.files && input.files.length > 0) {
    nameSpan.textContent = input.files[0].name;
    label.classList.add('has-file');
  } else {
    nameSpan.textContent = 'Upload PDF, DOC, or DOCX';
    label.classList.remove('has-file');
  }
}

// ============================================================
// SUBMIT APPLICATION
// ============================================================
function submitApplication() {
  var name = document.getElementById('applyName').value.trim();
  var email = document.getElementById('applyEmail').value.trim();
  var linkedin = document.getElementById('applyLinkedin').value.trim();
  var role = document.getElementById('applyRole').value.trim();
  var coverNote = document.getElementById('applyCoverNote').value.trim();
  var cvInput = document.getElementById('applyCv');
  var btn = document.getElementById('applyBtn');

  // Validate
  var valid = true;
  if (!name) { document.getElementById('applyName').style.borderColor = 'var(--error)'; valid = false; }
  if (!email) { document.getElementById('applyEmail').style.borderColor = 'var(--error)'; valid = false; }
  if (!cvInput.files || cvInput.files.length === 0) {
    document.getElementById('fileLabel').style.borderColor = 'var(--error)';
    valid = false;
  }
  if (!valid) {
    showMsg('error', 'Please fill in all required fields and attach your CV.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'SUBMITTING...';
  hideMessages();

  var cvFile = cvInput.files[0];

  // Step 1: Create the CV Applications record (without file)
  var fields = {
    'Applicant Name': name,
    'Email': email,
    'Current Role': role,
    'Other Info': coverNote,
    'Date Applied': new Date().toISOString().split('T')[0]
  };

  if (linkedin) fields['LinkedIn URL'] = linkedin;

  if (currentJob && currentJob.id) {
    fields['Job Applied For'] = [currentJob.id];
  }

  proxyFetch('/v0/' + AIRTABLE_BASE_ID + '/' + AIRTABLE_CV_TABLE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: fields })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) {
      btn.disabled = false;
      btn.textContent = 'SUBMIT APPLICATION';
      showMsg('error', 'Something went wrong: ' + (data.error.message || 'Unknown error') + '. Please try again.');
      return;
    }

    var recordId = data.id;

    // Step 2: Upload CV file to the record's attachment field
    if (cvFile && recordId) {
      var uploadPath = '/v0/' + AIRTABLE_BASE_ID + '/' + recordId + '/CV%20File/uploadAttachment';
      var formData = new FormData();
      formData.append('file', cvFile);

      proxyFetch(uploadPath, {
        method: 'POST',
        body: formData
      })
      .then(function() {
        btn.disabled = false;
        btn.textContent = 'SUBMIT APPLICATION';
        showMsg('success', '<strong>Application submitted!</strong> We\'ve received your application for ' + (currentJob ? currentJob.title : 'this role') + '. We\'ll be in touch soon.');
        btn.style.display = 'none';
      })
      .catch(function() {
        // Record was created even if file upload failed
        btn.disabled = false;
        btn.textContent = 'SUBMIT APPLICATION';
        showMsg('success', '<strong>Application submitted!</strong> We\'ve received your application for ' + (currentJob ? currentJob.title : 'this role') + '. We\'ll be in touch soon. (Note: CV file may not have attached — please email it to us if needed.)');
        btn.style.display = 'none';
      });
    } else {
      btn.disabled = false;
      btn.textContent = 'SUBMIT APPLICATION';
      showMsg('success', '<strong>Application submitted!</strong> We\'ve received your application for ' + (currentJob ? currentJob.title : 'this role') + '. We\'ll be in touch soon.');
      btn.style.display = 'none';
    }
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = 'SUBMIT APPLICATION';
    showMsg('error', 'Failed to submit. Please check your connection and try again.');
  });
}

// ============================================================
// UI HELPERS
// ============================================================
function showMsg(type, html) {
  document.getElementById('successMsg').classList.remove('active');
  document.getElementById('errorMsg').classList.remove('active');
  var el = document.getElementById(type === 'success' ? 'successMsg' : 'errorMsg');
  el.innerHTML = html;
  el.classList.add('active');
}

function hideMessages() {
  document.getElementById('successMsg').classList.remove('active');
  document.getElementById('errorMsg').classList.remove('active');
}

// Clear validation on input
['applyName', 'applyEmail', 'applyLinkedin', 'applyRole'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', function() { this.style.borderColor = ''; });
});

// ============================================================
// INIT
// ============================================================
fetchJob(getJobId());
</script>

</body>
</html>
